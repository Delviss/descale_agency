name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/add-partners-Pwy5m
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Queue concurrent runs instead of cancelling them — cancelled runs
# show up as failures in the Actions tab and create false-positive
# "errors" when several pushes land in quick succession.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Build
        env:
          VITE_BASE_PATH: ${{ steps.pages.outputs.base_path }}/
        run: npm run build

      - name: Create SPA 404 fallback
        run: cp build/index.html build/404.html

      - name: Add .nojekyll
        run: touch build/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  # Only the main branch is allowed to publish to the live Pages site.
  # Builds on preview branches still run (above) so we know the code
  # compiles, but the deploy step is skipped to avoid environment-
  # protection failures (github-pages env restricts deploys to main).
  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
