server {
  listen       80;
  server_name  _;

  root   /usr/share/nginx/html;
  index  index.html;

  # Gzip
  gzip on;
  gzip_vary on;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_types
    text/plain
    text/css
    text/xml
    application/javascript
    application/json
    application/xml
    application/xml+rss
    application/manifest+json
    image/svg+xml
    font/woff
    font/woff2;

  # Brotli (enabled when ngx_brotli module is available)
  # brotli on;
  # brotli_comp_level 5;
  # brotli_types text/plain text/css application/javascript application/json image/svg+xml;

  # Long-cache hashed build assets
  location /assets/images/ {
    expires 30d;
    add_header Cache-Control "public, must-revalidate";
    try_files $uri =404;
  }

  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Static image/font files at root — moderate cache
  location ~* \.(png|jpg|jpeg|webp|avif|svg|ico|woff|woff2)$ {
    expires 30d;
    add_header Cache-Control "public, must-revalidate";
    try_files $uri =404;
  }

  # HTML: no cache (SPA entry must always be fresh)
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Security headers
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
}
